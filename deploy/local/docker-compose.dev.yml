# All-in-docker dev environment (#36). Overlays deploy/local/docker-compose.yml.
#
# Usage:
#   infisical run --env=dev -- docker compose \
#     -f deploy/local/docker-compose.yml \
#     -f deploy/local/docker-compose.dev.yml up
#
# Or just `make dev` which wraps the above.
#
# Architecture:
#   - Each Rust service runs `cargo watch -x 'run --bin X'` in its own
#     container. Source bind-mounted; target/ stays on the repo mount so
#     large build artifacts do not consume the small Docker root overlay.
#     The cargo registry remains a named volume so dependency downloads are
#     shared across service containers.
#   - Vite dev server in a node container exposes HMR on :5173.
#   - Secrets come from the SHELL env (Infisical injects them via
#     `infisical run --env=dev -- ...` wrapping the compose command).

x-rust-common: &rust-common
  build:
    context: ../..
    dockerfile: Dockerfile.dev
  image: stocks-rust-dev:latest        # shared image across services
  working_dir: /app
  volumes:
    - ../..:/app                       # bind whole repo (Rust + prompts/ + web/dist)
    - cargo-cache:/usr/local/cargo/registry
  environment:
    # Defaults — override via shell env (Infisical-injected) when needed.
    - DATABASE_URL=postgres://stocks:stocks_dev_only@postgres:5432/stocks?sslmode=disable
    - NATS_URL=nats://nats:4222
    - GATEWAY_ADDR=:8080
    - LLM_PROVIDER
    - LLM_MODEL_DEEP
    - LLM_MODEL_ROUTINE
    - LLM_MODEL_TRIAGE
    - SEC_EDGAR_UA
    - FRED_API_KEY
    - ANTHROPIC_BASE_URL
    - ANTHROPIC_API_KEY
    - ANTHROPIC_VERSION
    - OPENAI_BASE_URL
    - OPENAI_API_KEY
    - MASSIVE_API_KEY
    - MASSIVE_BASE_URL
    - FMP_API_KEY
    - FMP_BASE_URL
    - FMP_MIN_REQUEST_INTERVAL_MS=${FMP_MIN_REQUEST_INTERVAL_MS:-750}
    - FMP_RATE_LIMIT_BACKOFF_MS=${FMP_RATE_LIMIT_BACKOFF_MS:-60000}
    - FMP_MAX_RATE_LIMIT_BACKOFF_MS=${FMP_MAX_RATE_LIMIT_BACKOFF_MS:-900000}
    - FRED_MIN_REQUEST_INTERVAL_MS=${FRED_MIN_REQUEST_INTERVAL_MS:-2000}
    - FRED_RATE_LIMIT_BACKOFF_MS=${FRED_RATE_LIMIT_BACKOFF_MS:-300000}
    - FRED_MAX_RATE_LIMIT_BACKOFF_MS=${FRED_MAX_RATE_LIMIT_BACKOFF_MS:-3600000}
    - FMP_PRICE_INTERVAL_SECS=${FMP_PRICE_INTERVAL_SECS:-1800}
    - FMP_PRICE_MAX_SYMBOLS_PER_PASS=${FMP_PRICE_MAX_SYMBOLS_PER_PASS:-125}
    - FMP_LIVE_BAR_INTERVAL_SECS=${FMP_LIVE_BAR_INTERVAL_SECS:-60}
    - FMP_LIVE_BAR_MAX_SYMBOLS_PER_PASS=${FMP_LIVE_BAR_MAX_SYMBOLS_PER_PASS:-25}
    - FMP_LIVE_BAR_ENTITLEMENT_BACKOFF_SECS=${FMP_LIVE_BAR_ENTITLEMENT_BACKOFF_SECS:-3600}
    - FMP_ESTIMATES_INTERVAL_SECS=${FMP_ESTIMATES_INTERVAL_SECS:-1800}
    - FMP_ESTIMATES_MAX_SYMBOLS_PER_PASS=${FMP_ESTIMATES_MAX_SYMBOLS_PER_PASS:-100}
    - FMP_OPINION_INTERVAL_SECS=${FMP_OPINION_INTERVAL_SECS:-1800}
    - FMP_OPINION_MAX_SYMBOLS_PER_PASS=${FMP_OPINION_MAX_SYMBOLS_PER_PASS:-75}
    - NEWS_INTERVAL_SECS=${NEWS_INTERVAL_SECS:-1800}
    - NEWS_MAX_SYMBOLS_PER_PASS=${NEWS_MAX_SYMBOLS_PER_PASS:-100}
    - EDGAR_INTERVAL_SECS=${EDGAR_INTERVAL_SECS:-1800}
    - EDGAR_MAX_SYMBOLS_PER_PASS=${EDGAR_MAX_SYMBOLS_PER_PASS:-100}
    - FRED_INTERVAL_SECS=${FRED_INTERVAL_SECS:-1800}
    - CBOE_INTERVAL_SECS=${CBOE_INTERVAL_SECS:-1800}
    - XBRL_INTERVAL_SECS=${XBRL_INTERVAL_SECS:-21600}
    - XBRL_MAX_SYMBOLS_PER_PASS=${XBRL_MAX_SYMBOLS_PER_PASS:-100}
    - FMP_SCREENER_INTERVAL_SECS=${FMP_SCREENER_INTERVAL_SECS:-86400}
    # Dev-mode UX (#38): gateway's SPA fallback redirects browser to vite.
    - STOCKS_DEV_MODE=1
    - STOCKS_DEV_UI_URL=http://localhost:5173
    # Faster staleness sweep in dev so demos don't wait 5 min. Only `staler` reads it.
    - STALER_INTERVAL_SECS=30
    - EVAL_INTERVAL_SECS=20
    - CONSENSUS_INTERVAL_SECS=30
    - DISCOVERY_INTERVAL_SECS=60
    - PRICE_ALERT_INTERVAL_SECS=${PRICE_ALERT_INTERVAL_SECS:-60}
    - AUTOMATION_STRATEGY_INTERVAL_SECS=${AUTOMATION_STRATEGY_INTERVAL_SECS:-60}
    - AUTOMATION_STRATEGY_MAX_PER_PASS=${AUTOMATION_STRATEGY_MAX_PER_PASS:-100}
    - RUST_LOG=info,sqlx=warn
    # cargo-watch occasionally hits "could not find Cargo.toml" if the bind
    # mount isn't ready; small delay tolerates the race on first start.
    - CARGO_WATCH_QUIET=1
  depends_on:
    postgres:
      condition: service_healthy
    nats:
      condition: service_healthy
  restart: unless-stopped

services:
  gateway:
    <<: *rust-common
    container_name: stocks-gateway
    ports:
      - "8080:8080"
    command: >-
      cargo watch -w src -w web/dist -w Cargo.toml -w Cargo.lock
        -x 'run --bin gateway'

  ingest:
    <<: *rust-common
    container_name: stocks-ingest
    command: >-
      cargo watch -w src -w Cargo.toml
        -x 'run --bin ingest'

  regime:
    <<: *rust-common
    container_name: stocks-regime
    command: >-
      cargo watch -w src -w Cargo.toml
        -x 'run --bin regime'

  router:
    <<: *rust-common
    container_name: stocks-router
    command: >-
      cargo watch -w src -w Cargo.toml
        -x 'run --bin router'

  risk:
    <<: *rust-common
    container_name: stocks-risk
    command: >-
      cargo watch -w src -w Cargo.toml
        -x 'run --bin risk'

  goalpost:
    <<: *rust-common
    container_name: stocks-goalpost
    command: >-
      cargo watch -w src -w Cargo.toml
        -x 'run --bin goalpost'

  staler:
    <<: *rust-common
    container_name: stocks-staler
    command: >-
      cargo watch -w src -w Cargo.toml
        -x 'run --bin staler'

  evaluator:
    <<: *rust-common
    container_name: stocks-evaluator
    command: >-
      cargo watch -w src -w Cargo.toml
        -x 'run --bin evaluator'

  consensus:
    <<: *rust-common
    container_name: stocks-consensus
    command: >-
      cargo watch -w src -w Cargo.toml
        -x 'run --bin consensus'

  reflection:
    <<: *rust-common
    container_name: stocks-reflection
    command: >-
      cargo watch -w src -w Cargo.toml
        -x 'run --bin reflection'

  discovery:
    <<: *rust-common
    container_name: stocks-discovery
    command: >-
      cargo watch -w src -w Cargo.toml
        -x 'run --bin discovery'

  price-alerts:
    <<: *rust-common
    container_name: stocks-price-alerts
    command: >-
      cargo watch -w src -w Cargo.toml
        -x 'run --bin price-alerts'

  strategy-runner:
    <<: *rust-common
    container_name: stocks-strategy-runner
    command: >-
      cargo watch -w src -w Cargo.toml
        -x 'run --bin strategy-runner'

  # Vite dev server with HMR. Browser hits :5173 directly during dev; vite's
  # proxy forwards /api/* and /healthz + /api/stream (SSE) to the gateway
  # container. Production serves the SPA from the rust gateway via rust-embed.
  web:
    build:
      context: ../..
      dockerfile: Dockerfile.web-dev
    image: stocks-web-dev:latest
    container_name: stocks-web
    ports:
      - "5173:5173"
    environment:
      # vite.config.ts reads this so /api/* proxies to the gateway service.
      - API_TARGET=http://gateway:8080
    volumes:
      - ../../web:/app
      - web-node-modules:/app/node_modules   # don't bind-mount node_modules
    depends_on:
      - gateway

  # Cognition consumer (#100): on discovery.confirmed, runs context_maintainer
  # + thesis_engine + sharpen + challenge for the symbol. Also runs a bounded
  # maintenance sweep over active tickers so stale/no-context names retry.
  cognition:
    image: python:3.12-slim
    container_name: stocks-cognition
    working_dir: /repo/py
    volumes:
      # Mount whole repo so the Python services can read prompts/ at runtime.
      - ../..:/repo
    environment:
      - DATABASE_URL=postgres://stocks:stocks_dev_only@postgres:5432/stocks?sslmode=disable
      - NATS_URL=nats://nats:4222
      - FRED_API_KEY
      - FMP_API_KEY
      - FMP_BASE_URL
      - SEC_EDGAR_UA
      - ANTHROPIC_API_KEY
      - ANTHROPIC_BASE_URL
      - ANTHROPIC_VERSION
      - LLM_PROVIDER
      - LLM_MODEL_DEEP
      - LLM_MODEL_ROUTINE
      - LLM_MODEL_TRIAGE
      - COGNITION_SWEEP_SECONDS=${COGNITION_SWEEP_SECONDS:-300}
      - COGNITION_CONTEXT_MAX_AGE_HOURS=${COGNITION_CONTEXT_MAX_AGE_HOURS:-12}
      - COGNITION_OPEN_THESIS_MAX_AGE_MINUTES=${COGNITION_OPEN_THESIS_MAX_AGE_MINUTES:-30}
      - COGNITION_DECLINE_RETRY_HOURS=${COGNITION_DECLINE_RETRY_HOURS:-6}
      - COGNITION_MAX_SYMBOLS_PER_SWEEP=${COGNITION_MAX_SYMBOLS_PER_SWEEP:-20}
      - COGNITION_MIN_SYMBOLS_PER_SWEEP=${COGNITION_MIN_SYMBOLS_PER_SWEEP:-20}
      - COGNITION_SWEEP_CONCURRENCY=${COGNITION_SWEEP_CONCURRENCY:-2}
      - COGNITION_EVIDENCE_SYNC_LIMIT=${COGNITION_EVIDENCE_SYNC_LIMIT:-200}
      - SOURCE_TASK_SWEEP_SECONDS=${SOURCE_TASK_SWEEP_SECONDS:-60}
      - SOURCE_TASK_MAX_SYMBOLS_PER_SWEEP=${SOURCE_TASK_MAX_SYMBOLS_PER_SWEEP:-5}
      - RESEARCH_PROVIDER=${RESEARCH_PROVIDER:-gdelt,bing_news}
      - RESEARCH_MAX_AGE_HOURS=${RESEARCH_MAX_AGE_HOURS:-24}
      - RESEARCH_MAX_QUERIES=${RESEARCH_MAX_QUERIES:-6}
      - RESEARCH_MAX_RESULTS_PER_QUERY=${RESEARCH_MAX_RESULTS_PER_QUERY:-5}
      - RESEARCH_MIN_REQUEST_INTERVAL_MS=${RESEARCH_MIN_REQUEST_INTERVAL_MS:-1500}
      - FIRECRAWL_BASE_URL=${FIRECRAWL_BASE_URL:-http://firecrawl-api:3002}
      - FIRECRAWL_API_KEY
      - FIRECRAWL_SEARCH_PATH=${FIRECRAWL_SEARCH_PATH:-/v2/search}
      - FIRECRAWL_SEARCH_TBS=${FIRECRAWL_SEARCH_TBS:-qdr:m}
    command: >-
      sh -c "pip install -q -e . && python -m stocks.cognition_service"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy

  ibkr-gateway:
    image: ${IBKR_GATEWAY_IMAGE:-ghcr.io/gnzsnz/ib-gateway:10.45.1h}
    container_name: stocks-ibkr-gateway
    profiles: ["ibkr-gateway"]
    restart: unless-stopped
    environment:
      - TWS_USERID
      - TWS_PASSWORD
      - TWS_USERID_PAPER
      - TWS_PASSWORD_PAPER
      - TRADING_MODE=${IBKR_TRADING_MODE:-paper}
      - READ_ONLY_API=${IBKR_GATEWAY_READ_ONLY_API:-yes}
      - TWS_ACCEPT_INCOMING=${IBKR_TWS_ACCEPT_INCOMING:-accept}
      - TWS_SETTINGS_PATH=${IBKR_GATEWAY_SETTINGS_PATH:-}
      - TIME_ZONE=${IBKR_GATEWAY_TIME_ZONE:-Europe/Amsterdam}
      - TWOFA_TIMEOUT_ACTION=${IBKR_TWOFA_TIMEOUT_ACTION:-restart}
      - RELOGIN_AFTER_TWOFA_TIMEOUT=${IBKR_RELOGIN_AFTER_TWOFA_TIMEOUT:-yes}
      - VNC_SERVER_PASSWORD
    ports:
      - "127.0.0.1:${IBKR_GATEWAY_LIVE_PORT:-4001}:4003"
      - "127.0.0.1:${IBKR_GATEWAY_PAPER_PORT:-4002}:4004"
      - "127.0.0.1:${IBKR_GATEWAY_VNC_PORT:-15900}:5900"
  ibkr-sync:
    image: python:3.12-slim
    container_name: stocks-ibkr-sync
    profiles: ["ibkr"]
    working_dir: /repo/py
    volumes:
      - ../..:/repo
    environment:
      - DATABASE_URL=postgres://stocks:stocks_dev_only@postgres:5432/stocks?sslmode=disable
      - NATS_URL=nats://nats:4222
      - IBKR_HOST=${IBKR_HOST:-host.docker.internal}
      - IBKR_PORT=${IBKR_PORT:-7497}
      - IBKR_CLIENT_ID=${IBKR_CLIENT_ID:-81}
      - IBKR_ACCOUNT
      - IBKR_READONLY=${IBKR_READONLY:-true}
      - IBKR_TIMEOUT_SECONDS=${IBKR_TIMEOUT_SECONDS:-6}
      - IBKR_SYNC_INTERVAL_SECONDS=${IBKR_SYNC_INTERVAL_SECONDS:-30}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: >-
      sh -c "pip install -q -e . && python -m stocks.ibkr_sync --loop"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy

volumes:
  cargo-cache:
  web-node-modules:
